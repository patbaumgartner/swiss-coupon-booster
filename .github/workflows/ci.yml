name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: "25"
  PYTHON_VERSION: "3.14"
  MAVEN_OPTS: "-Xmx1024m -XX:+UseG1GC"
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/playwright

jobs:
  # ── Java / Spring Boot ──────────────────────────────────────────────────────
  java:
    name: Java – Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: coupon-booster

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-browsers-${{ hashFiles('coupon-booster/pom.xml') }}
          restore-keys: playwright-browsers-

      - name: Install system dependencies
        run: sudo apt-get update -q && sudo apt-get install -y --no-install-recommends xvfb

      - name: Install Playwright browsers
        run: |
          mvn exec:java -e -ntp \
            -Dexec.mainClass="com.microsoft.playwright.CLI" \
            -Dexec.args="install --with-deps"

      - name: Check code formatting
        run: mvn spring-javaformat:validate -ntp

      - name: Build, test & verify
        # Skip OWASP dependency-check on every push (it takes ~20 min downloading NVD data).
        # Run it only via the release pipeline or a dedicated scheduled workflow.
        run: xvfb-run -a mvn clean verify -ntp -Dmaven.test.failure.ignore=true -Ddependency-check.skip=true
        env:
          MAVEN_OPTS: ${{ env.MAVEN_OPTS }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}

      - name: List test report files
        if: always()
        run: find target/surefire-reports target/failsafe-reports -name '*.xml' 2>/dev/null || echo 'No XML report files found'

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Test Results – Java ${{ env.JAVA_VERSION }}"
          path: "coupon-booster/target/surefire-reports/*.xml,coupon-booster/target/failsafe-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jacoco-report
          path: coupon-booster/target/site/jacoco/
          retention-days: 7
          if-no-files-found: ignore

  # ── Python / stealth-service ────────────────────────────────────────────────
  python:
    name: Python – Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: stealth-service

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: stealth-service/uv.lock

      - name: Install dependencies (locked)
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest -v --tb=short --junit-xml=test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Test Results – Python ${{ env.PYTHON_VERSION }}"
          path: stealth-service/test-results.xml
          reporter: java-junit
          fail-on-error: true

  # ── Docker build validation ──────────────────────────────────────────────────
  docker:
    name: Docker – Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [java, python]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build stealth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./stealth-service
          file: ./stealth-service/Dockerfile
          push: false
          tags: patbaumgartner/stealth-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build coupon-booster image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./coupon-booster/Dockerfile
          push: false
          tags: patbaumgartner/coupon-booster:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
