name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: "25"
  PYTHON_VERSION: "3.14"
  MAVEN_OPTS: "-Xmx1024m -XX:+UseG1GC"
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/playwright

jobs:
  # ── Java / Spring Boot ──────────────────────────────────────────────────────
  java:
    name: Java – Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: coupon-booster

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-browsers-${{ hashFiles('coupon-booster/pom.xml') }}
          restore-keys: playwright-browsers-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb

      - name: Install Playwright browsers
        run: |
          ./mvnw exec:java -e -ntp \
            -Dexec.mainClass="com.microsoft.playwright.CLI" \
            -Dexec.args="install --with-deps"

      - name: Check code formatting
        run: ./mvnw spring-javaformat:validate -ntp

      - name: Build, test & verify
        # OWASP dependency-check is skipped here (it downloads the full NVD feed).
        # Run it from the release pipeline or a dedicated scheduled workflow instead.
        run: xvfb-run -a ./mvnw clean verify -ntp -Dmaven.test.failure.ignore=true -Ddependency-check.skip=true
        env:
          MAVEN_OPTS: ${{ env.MAVEN_OPTS }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Test Results – Java ${{ env.JAVA_VERSION }}"
          path: "coupon-booster/target/surefire-reports/*.xml,coupon-booster/target/failsafe-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true

  # ── Python / patchright sidecar ─────────────────────────────────────────────
  python:
    name: Python – Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: patchright

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: patchright/uv.lock

      - name: Install dependencies (locked)
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest -v --tb=short --junit-xml=test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Test Results – Python ${{ env.PYTHON_VERSION }}"
          path: patchright/test-results.xml
          reporter: java-junit
          fail-on-error: true

  # ── Docker: publish native image as snapshot + latest (main pushes only) ────
  # Runs only on direct pushes to main / manual dispatch (never on PRs or forks,
  # where the Docker Hub secrets are unavailable). Publishes the GraalVM native
  # application image, its run image and the patchright sidecar, each tagged with
  # the current project version (e.g. 0.2.0-SNAPSHOT) and :latest.
  docker:
    name: Docker – Publish snapshot & latest
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [java, python]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: coupon-booster
    env:
      MAVEN_OPTS: "-Xmx2048m -XX:+UseG1GC"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve project version
        id: version
        run: echo "version=$(./mvnw -q -ntp help:evaluate -Dexpression=project.version -DforceStdout)" >> "$GITHUB_OUTPUT"

      # Run image must be pushed before the native build: the buildpack pulls it
      # via runImage/pullPolicy=IF_NOT_PRESENT configured in pom.xml.
      - name: Build & push run image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./coupon-booster/run-image.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster-run:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster-run:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push patchright sidecar
        uses: docker/build-push-action@v7
        with:
          context: ./patchright
          file: ./patchright/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster-patchright:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster-patchright:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -Pnative + BP_NATIVE_IMAGE=true compile a GraalVM native image (x86-64-v2).
      # AOT pins the auth mode to 'sidecar' (see pom.xml native profile).
      - name: Build & publish native image (snapshot & latest)
        run: |
          ./mvnw -B -ntp -Pnative spring-boot:build-image -DskipTests \
            -Dspring-boot.build-image.publish=true \
            -Dspring-boot.build-image.imageName=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster:${{ steps.version.outputs.version }}
          docker buildx imagetools create \
            --tag docker.io/${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster:latest \
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster:${{ steps.version.outputs.version }}
