name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: "25"
  PYTHON_VERSION: "3.14"
  MAVEN_OPTS: "-Xmx1024m -XX:+UseG1GC"
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/playwright

jobs:
  # ── Java / Spring Boot ──────────────────────────────────────────────────────
  java:
    name: Java – Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: coupon-booster

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-browsers-${{ hashFiles('coupon-booster/pom.xml') }}
          restore-keys: playwright-browsers-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb

      - name: Install Playwright browsers
        run: |
          ./mvnw exec:java -e -ntp \
            -Dexec.mainClass="com.microsoft.playwright.CLI" \
            -Dexec.args="install --with-deps"

      - name: Check code formatting
        run: ./mvnw spring-javaformat:validate -ntp

      - name: Build, test & verify
        # Skip OWASP dependency-check on every push (it takes ~20 min downloading NVD data).
        # Run it only via the release pipeline or a dedicated scheduled workflow.
        run: xvfb-run -a ./mvnw clean verify -ntp -Dmaven.test.failure.ignore=true -Ddependency-check.skip=true
        env:
          MAVEN_OPTS: ${{ env.MAVEN_OPTS }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}

      - name: List test report files
        if: always()
        run: find target/surefire-reports target/failsafe-reports -name '*.xml' 2>/dev/null || echo 'No XML report files found'

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Test Results – Java ${{ env.JAVA_VERSION }}"
          path: "coupon-booster/target/surefire-reports/*.xml,coupon-booster/target/failsafe-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jacoco-report
          path: coupon-booster/target/site/jacoco/
          retention-days: 7
          if-no-files-found: ignore

  # ── Python / patchright ────────────────────────────────────────────────
  python:
    name: Python – Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: patchright

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: patchright/uv.lock

      - name: Install dependencies (locked)
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest -v --tb=short --junit-xml=test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Test Results – Python ${{ env.PYTHON_VERSION }}"
          path: patchright/test-results.xml
          reporter: java-junit
          fail-on-error: true

  # ── Docker build + publish latest (push to main only) ───────────────────────
  docker:
    name: Docker – Build & Publish latest
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [java, python]
    permissions:
      contents: read
    env:
      # Fall back to a local namespace when the Docker Hub secret is unavailable
      # (e.g. Dependabot / fork PRs) so image tags stay valid and builds succeed.
      IMAGE_OWNER: ${{ secrets.DOCKERHUB_USERNAME || 'local' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only authenticate + publish on direct pushes to main (not PRs / develop).
      - name: Determine publish flag
        id: publish
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.publish.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build${{ steps.publish.outputs.enabled == 'true' && ' & push' || '' }} patchright image
        uses: docker/build-push-action@v7
        with:
          context: ./patchright
          file: ./patchright/Dockerfile
          push: ${{ steps.publish.outputs.enabled == 'true' }}
          tags: ${{ env.IMAGE_OWNER }}/coupon-booster-patchright:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build coupon-booster run image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./coupon-booster/run-image.Dockerfile
          load: true
          tags: ${{ env.IMAGE_OWNER }}/coupon-booster-run:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push coupon-booster run image (latest)
        if: steps.publish.outputs.enabled == 'true'
        run: docker push ${{ env.IMAGE_OWNER }}/coupon-booster-run:latest

      - name: Build coupon-booster image
        working-directory: coupon-booster
        # -Pnative compiles a GraalVM native image via the Paketo native buildpack.
        # AOT pins the auth mode to 'sidecar' (see pom.xml native profile).
        run: ./mvnw -B -Pnative spring-boot:build-image -DskipTests -ntp
        env:
          MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

      - name: Tag & push coupon-booster image (latest)
        if: steps.publish.outputs.enabled == 'true'
        run: |
          VERSION="$(./mvnw -q -ntp help:evaluate -Dexpression=project.version -DforceStdout)"
          docker tag \
            ${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster:"$VERSION" \
            ${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/coupon-booster:latest
        working-directory: coupon-booster
