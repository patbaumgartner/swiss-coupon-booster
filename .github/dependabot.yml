version: 2
updates:

  # ── Maven (coupon-booster/) ────────────────────────────────────────────────
  - package-ecosystem: "maven"
    directory: "/coupon-booster"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "patbaumgartner"
    assignees:
      - "patbaumgartner"
    commit-message:
      prefix: "deps(java)"
      include: "scope"
    labels:
      - "dependencies"
      - "java"

  # ── uv (stealth-service/) ──────────────────────────────────────────────────
  - package-ecosystem: "uv"
    directory: "/stealth-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "patbaumgartner"
    assignees:
      - "patbaumgartner"
    commit-message:
      prefix: "deps(python)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "patbaumgartner"
    assignees:
      - "patbaumgartner"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

